name = "blog-cms"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

# Secrets（GITHUB_TOKEN など）は wrangler secret / Pages の環境変数で設定する。
# ローカル開発では .dev.vars に書く（.gitignore 済み）。

# R2: images.kechiiiiin.com の実バケット（画像アップロード先）
# ※ pages_build_output_dir がある構成では、バインディングは wrangler.toml が正
#   （デプロイ時に自動反映。ダッシュボードの「追加」は無効化されるのが正常）。
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "images"

# KV: 一覧メタのキャッシュ（真実は GitHub。壊れたらキー削除で再構築される）
# ※ 上記と同じく wrangler.toml が正。デプロイ時に自動でバインドされる。
[[kv_namespaces]]
binding = "CMS_CACHE"
id = "bed190d381d846f0b24e7669fd04b172"
