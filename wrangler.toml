name = "blog-cms"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

# Secrets（GITHUB_TOKEN など）は wrangler secret / Pages の環境変数で設定する。
# ローカル開発では .dev.vars に書く（.gitignore 済み）。

# R2: images.kechiiiiin.com の実バケット（画像アップロード先）
# ※ Pages では wrangler.toml は参考値。ダッシュボード Settings → Functions →
#   R2 bucket bindings に同名 IMAGES を追加するのが本体（手作業）。
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "images"

# KV: 一覧メタのキャッシュ（真実は GitHub。壊れたらキー削除で再構築される）
# ※ Pages では wrangler.toml は参考値。ダッシュボード Settings → Functions →
#   KV namespace bindings に同名 CMS_CACHE を追加するのが本体（手作業）。
[[kv_namespaces]]
binding = "CMS_CACHE"
id = "bed190d381d846f0b24e7669fd04b172"
